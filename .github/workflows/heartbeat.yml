name: Keep Supabase Active

on:
  schedule:
    - cron: '0 0 */3 * *'  # Every 3 days at midnight
  workflow_dispatch:  # Allow manual trigger

jobs:
  heartbeat:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase
        run: |
          curl -s "${{ secrets.SUPABASE_URL }}/rest/v1/assessment_data?select=id&limit=1" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}" > /dev/null
          echo "Supabase pinged successfully"
